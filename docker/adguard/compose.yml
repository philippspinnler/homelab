services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    volumes:
        - work:/opt/adguardhome/work
        - conf:/opt/adguardhome/conf
    ports:
        - 53:53/udp
        - 8000:80
        - 8001:3000
    networks:
      - containers
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  work:
  conf:
  
networks:
  containers:
    external: true

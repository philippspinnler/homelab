services:
  dashboard:
    image: philippspinnler/dashboard:latest
    container_name: dashboard
    restart: unless-stopped
    # Host networking binds the dashboard directly on the host at :8201 (see PORT).
    # (Previously also required so the Sonos widget could discover speakers via
    # SSDP/multicast — Sonos now goes through Home Assistant, so that's no longer needed.)
    network_mode: host
    # All config is provided by Portainer's stack environment variables.
    # In Portainer use "Load variables from .env file" to bulk-import .env.example,
    # then fill in the real values — no need to add each key manually.
    environment:
      # homepage already publishes :3000 on the host, so serve the dashboard elsewhere.
      - HOST=0.0.0.0
      - PORT=8201

      # --- Layout (public) ---
      - NUXT_PUBLIC_WIDGETS_TOP_LEFT=${NUXT_PUBLIC_WIDGETS_TOP_LEFT}
      - NUXT_PUBLIC_WIDGETS_TOP_RIGHT=${NUXT_PUBLIC_WIDGETS_TOP_RIGHT}
      - NUXT_PUBLIC_WIDGETS_LEFT=${NUXT_PUBLIC_WIDGETS_LEFT}
      - NUXT_PUBLIC_WIDGETS_RIGHT=${NUXT_PUBLIC_WIDGETS_RIGHT}
      - NUXT_PUBLIC_WIDGETS_BOTTOM=${NUXT_PUBLIC_WIDGETS_BOTTOM}
      - NUXT_PUBLIC_ENABLE_GLASSMORPHISM=${NUXT_PUBLIC_ENABLE_GLASSMORPHISM}
      - NUXT_PUBLIC_USE_MOCK_DATA=${NUXT_PUBLIC_USE_MOCK_DATA}

      # --- Weather ---
      - NUXT_WEATHER_API_KEY=${NUXT_WEATHER_API_KEY}
      - NUXT_WEATHER_DEFAULT_LAT=${NUXT_WEATHER_DEFAULT_LAT}
      - NUXT_WEATHER_DEFAULT_LON=${NUXT_WEATHER_DEFAULT_LON}

      # --- Locale ---
      - NUXT_TIMEZONE=${NUXT_TIMEZONE}

      # --- Home Assistant ---
      - NUXT_HOME_ASSISTANT_URL=${NUXT_HOME_ASSISTANT_URL}
      - NUXT_HOME_ASSISTANT_TOKEN=${NUXT_HOME_ASSISTANT_TOKEN}
      - NUXT_HOME_ASSISTANT_PERSON_ENTITIES=${NUXT_HOME_ASSISTANT_PERSON_ENTITIES}

      # --- Doorbell overlay (UniFi Protect G6 Entry via Home Assistant) ---
      - NUXT_PUBLIC_DOORBELL_ENABLED=${NUXT_PUBLIC_DOORBELL_ENABLED}
      - NUXT_DOORBELL_EVENT_ENTITY=${NUXT_DOORBELL_EVENT_ENTITY}
      - NUXT_DOORBELL_CAMERA_ENTITY=${NUXT_DOORBELL_CAMERA_ENTITY}
      - NUXT_PUBLIC_DOORBELL_POLL_MS=${NUXT_PUBLIC_DOORBELL_POLL_MS}
      - NUXT_PUBLIC_DOORBELL_OVERLAY_SECONDS=${NUXT_PUBLIC_DOORBELL_OVERLAY_SECONDS}

      # --- Netatmo ---
      - NUXT_NETATMO_INDOOR_TEMPERATURE_ENTITY=${NUXT_NETATMO_INDOOR_TEMPERATURE_ENTITY}
      - NUXT_NETATMO_INDOOR_CO2_ENTITY=${NUXT_NETATMO_INDOOR_CO2_ENTITY}
      - NUXT_NETATMO_OUTDOOR_TEMPERATURE_ENTITY=${NUXT_NETATMO_OUTDOOR_TEMPERATURE_ENTITY}

      # --- Sonos now-playing overlay (via Home Assistant media_player entities) ---
      - NUXT_SONOS_MEDIA_PLAYERS=${NUXT_SONOS_MEDIA_PLAYERS}
      - NUXT_PUBLIC_SONOS_OVERLAY_ENABLED=${NUXT_PUBLIC_SONOS_OVERLAY_ENABLED}
      - NUXT_PUBLIC_SONOS_OVERLAY_POSITION=${NUXT_PUBLIC_SONOS_OVERLAY_POSITION}

      # --- Low-battery overlay (via Home Assistant device_class: battery entities) ---
      - NUXT_BATTERY_THRESHOLD=${NUXT_BATTERY_THRESHOLD}
      - NUXT_PUBLIC_BATTERY_OVERLAY_ENABLED=${NUXT_PUBLIC_BATTERY_OVERLAY_ENABLED}
      - NUXT_PUBLIC_BATTERY_OVERLAY_POSITION=${NUXT_PUBLIC_BATTERY_OVERLAY_POSITION}

      # --- Calendars / transport / speedtest / cars (JSON) ---
      - NUXT_CALENDARS_JSON=${NUXT_CALENDARS_JSON}
      - NUXT_TRANSPORT_CONNECTIONS_JSON=${NUXT_TRANSPORT_CONNECTIONS_JSON}
      - NUXT_SPEEDTESTS_JSON=${NUXT_SPEEDTESTS_JSON}
      - NUXT_CARS_JSON=${NUXT_CARS_JSON}

      # --- Inverter ---
      - NUXT_INVERTER_PV_POWER_ENTITY=${NUXT_INVERTER_PV_POWER_ENTITY}
      - NUXT_INVERTER_POWER_CONSUMPTION_ENTITY=${NUXT_INVERTER_POWER_CONSUMPTION_ENTITY}
      - NUXT_INVERTER_GRID_CONSUMPTION_ENTITY=${NUXT_INVERTER_GRID_CONSUMPTION_ENTITY}
      - NUXT_INVERTER_GRID_FEEDIN_ENTITY=${NUXT_INVERTER_GRID_FEEDIN_ENTITY}
      - NUXT_INVERTER_BATTERY_STATE_OF_CHARGE_ENTITY=${NUXT_INVERTER_BATTERY_STATE_OF_CHARGE_ENTITY}
      - NUXT_INVERTER_BATTERY_POWER_ENTITY=${NUXT_INVERTER_BATTERY_POWER_ENTITY}
      - NUXT_INVERTER_INVERT_BATTERY_POWER=${NUXT_INVERTER_INVERT_BATTERY_POWER}
      - NUXT_INVERTER_POWER_SCALE=${NUXT_INVERTER_POWER_SCALE}

      # --- Heizung (Stiebel Eltron ISG heat pump via Home Assistant) ---
      - NUXT_HEIZUNG_IS_HEATING_ENTITY=${NUXT_HEIZUNG_IS_HEATING_ENTITY}
      - NUXT_HEIZUNG_IS_COOLING_ENTITY=${NUXT_HEIZUNG_IS_COOLING_ENTITY}
      - NUXT_HEIZUNG_ROOM_ACTUAL_ENTITY=${NUXT_HEIZUNG_ROOM_ACTUAL_ENTITY}
      - NUXT_HEIZUNG_ROOM_TARGET_ENTITY=${NUXT_HEIZUNG_ROOM_TARGET_ENTITY}
      - NUXT_HEIZUNG_OUTDOOR_ENTITY=${NUXT_HEIZUNG_OUTDOOR_ENTITY}

      # --- Photo album background ---
      - NUXT_ALBUM_PROVIDER=${NUXT_ALBUM_PROVIDER}
      - NUXT_ICLOUD_ALBUM_ID=${NUXT_ICLOUD_ALBUM_ID}
      - NUXT_IMMICH_URL=${NUXT_IMMICH_URL}
      - NUXT_IMMICH_API_KEY=${NUXT_IMMICH_API_KEY}
      - NUXT_IMMICH_SHARE_KEY=${NUXT_IMMICH_SHARE_KEY}
      - NUXT_IMMICH_ALBUM_NAME=${NUXT_IMMICH_ALBUM_NAME}
      - NUXT_IMMICH_C=${NUXT_IMMICH_C}

      # --- eo-guide (AppFigures) ---
      - NUXT_EOGUIDE_CLIENT_KEY=${NUXT_EOGUIDE_CLIENT_KEY}
      - NUXT_EOGUIDE_USERNAME=${NUXT_EOGUIDE_USERNAME}
      - NUXT_EOGUIDE_PASSWORD=${NUXT_EOGUIDE_PASSWORD}

    # Let Watchtower auto-update this container when a new :latest is pushed.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
